name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    env:
      # Placeholders para que `next build` no pete por env vars ausentes.
      # No son secretos reales — solo desbloquean el build estático.
      # Si en el futuro necesitamos secrets reales en CI, se sustituyen por ${{ secrets.* }}.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
      SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
      NEXT_PUBLIC_TMDB_API_KEY: placeholder_tmdb
      NEXT_PUBLIC_RAWG_KEY: placeholder_rawg
      NEXT_PUBLIC_GOOGLE_BOOKS_KEY: placeholder_books
      COMICVINE_KEY: placeholder_comicvine
      ANTHROPIC_API_KEY: placeholder_anthropic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
